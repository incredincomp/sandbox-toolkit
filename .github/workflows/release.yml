name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if [[ ! "$tag" =~ ^v ]]; then
            echo "Expected a version tag ref (v*). Found: '$tag'" >&2
            exit 1
          fi

          version="${tag#v}"
          preferred_notes_path="artifacts/releases/${version}.md"
          notes_path="$preferred_notes_path"

          if [[ ! -f "$preferred_notes_path" ]]; then
            mkdir -p artifacts/releases
            notes_path="artifacts/releases/${version}.generated.md"
            {
              printf '# sandbox-toolkit %s\n\n' "$tag"
              printf "Automated release generated from tag '%s'.\n\n" "$tag"
              printf "Prepared release notes file '%s' was not found.\n" "$preferred_notes_path"
              printf 'See CHANGELOG.md for detailed release notes.\n'
            } > "$notes_path"
          fi

          {
            echo "tag=$tag"
            echo "title=$tag"
            echo "notes_path=$notes_path"
          } >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.meta.outputs.tag }}
          TITLE: ${{ steps.meta.outputs.title }}
          NOTES_PATH: ${{ steps.meta.outputs.notes_path }}
        run: |
          set -euo pipefail

          prerelease_args=()
          if [[ "$TAG" == *-* ]]; then
            prerelease_args+=(--prerelease)
          fi

          if gh release view "$TAG" --json tagName >/dev/null 2>&1; then
            gh release edit "$TAG" --title "$TITLE" --notes-file "$NOTES_PATH" "${prerelease_args[@]}"
            exit 0
          fi

          gh release create "$TAG" --title "$TITLE" --notes-file "$NOTES_PATH" --verify-tag "${prerelease_args[@]}"
